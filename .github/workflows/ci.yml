name: CI

on:
  push:
    branches: [main, "eda-*", compare-countries, dashboard-dev]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python - <<'PY'
          import matplotlib
          import nbformat
          import numpy
          import pandas
          import requests
          import scipy
          import seaborn
          print("Python environment ready")
          PY

      - name: Validate notebooks
        run: |
          python - <<'PY'
          from pathlib import Path
          import nbformat

          for notebook in Path("notebooks").glob("*.ipynb"):
              nbformat.read(notebook, as_version=4)
              print(f"Validated {notebook}")
          PY
